<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Jars of raw honey with a honeycomb and bee">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7e6"/>
      <stop offset="1" stop-color="#f6efdd"/>
    </linearGradient>
    <linearGradient id="honey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2b544"/>
      <stop offset="1" stop-color="#c67c15"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>
  <!-- table -->
  <rect x="0" y="400" width="800" height="100" fill="#e9e3d6"/>
  <rect x="0" y="392" width="800" height="12" fill="#d4c8ad"/>
  <!-- honeycomb backdrop -->
  <g fill="#f2b544" opacity="0.28">
    <polygon points="640,70 668,54 696,70 696,102 668,118 640,102"/>
    <polygon points="696,102 724,86 752,102 752,134 724,150 696,134"/>
    <polygon points="640,134 668,118 696,134 696,166 668,182 640,166"/>
    <polygon points="696,166 724,150 752,166 752,198 724,214 696,198"/>
    <polygon points="584,102 612,86 640,102 640,134 612,150 584,134"/>
  </g>
  <!-- big honey jar -->
  <g transform="translate(230 210)">
    <rect x="-70" y="-30" width="140" height="26" rx="8" fill="#584730"/>
    <rect x="-78" y="-8" width="156" height="200" rx="26" fill="url(#honey)"/>
    <rect x="-58" y="20" width="20" height="150" rx="10" fill="#ffffff" opacity="0.28"/>
    <rect x="-78" y="80" width="156" height="70" rx="8" fill="#faf8f2" opacity="0.95"/>
    <text x="0" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#8a7346">RAW</text>
  </g>
  <!-- small jar -->
  <g transform="translate(430 270)">
    <rect x="-46" y="-24" width="92" height="20" rx="6" fill="#584730"/>
    <rect x="-52" y="-6" width="104" height="140" rx="18" fill="url(#honey)"/>
    <rect x="-38" y="16" width="14" height="100" rx="7" fill="#ffffff" opacity="0.28"/>
    <rect x="-52" y="56" width="104" height="46" rx="6" fill="#faf8f2" opacity="0.95"/>
  </g>
  <!-- dipper -->
  <g transform="translate(560 250) rotate(18)">
    <rect x="-5" y="0" width="10" height="120" rx="5" fill="#8a7346"/>
    <g fill="#c67c15">
      <ellipse cx="0" cy="-6" rx="24" ry="16"/>
      <ellipse cx="0" cy="4" rx="24" ry="16"/>
      <ellipse cx="0" cy="14" rx="22" ry="14"/>
    </g>
  </g>
  <!-- bee -->
  <g transform="translate(150 120)">
    <ellipse cx="0" cy="0" rx="26" ry="18" fill="#3f3327"/>
    <path d="M-16 -12 A26 18 0 0 1 -16 12" fill="#f2b544"/>
    <path d="M2 -16 A26 18 0 0 1 2 16" fill="#f2b544"/>
    <ellipse cx="-10" cy="-14" rx="18" ry="10" fill="#ffffff" opacity="0.8"/>
    <ellipse cx="10" cy="-14" rx="18" ry="10" fill="#ffffff" opacity="0.8"/>
  </g>
  <path d="M176 138 Q210 100 250 140 T330 150" fill="none" stroke="#c67c15" stroke-width="2" stroke-dasharray="4 6" opacity="0.6"/>
</svg>
