<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <!-- Seamless botanical texture tile. Motifs kept inside the tile margins so
       the pattern repeats without seams. Very low opacity — reads as texture. -->
  <g fill="none" stroke="#457d27" stroke-width="2" stroke-linecap="round" opacity="0.10">
    <!-- wheat sprig -->
    <g transform="translate(46 44)">
      <path d="M0 40 L0 -6"/>
      <path d="M0 2 q-10 -6 -14 -16"/>
      <path d="M0 2 q10 -6 14 -16"/>
      <path d="M0 -8 q-9 -5 -12 -14"/>
      <path d="M0 -8 q9 -5 12 -14"/>
      <path d="M0 -18 q-8 -4 -10 -12"/>
      <path d="M0 -18 q8 -4 10 -12"/>
    </g>
    <!-- leaf pair -->
    <g transform="translate(150 132) rotate(24)">
      <path d="M0 26 L0 -22"/>
      <path d="M0 6 q16 -4 20 -22 q-18 2 -20 22"/>
      <path d="M0 -6 q-16 -4 -20 -22 q18 2 20 22"/>
    </g>
    <!-- small sprout -->
    <g transform="translate(74 168)">
      <path d="M0 14 L0 -8"/>
      <path d="M0 0 q-12 -2 -16 -12 q12 0 16 12"/>
      <path d="M0 -4 q12 -2 16 -12 q-12 0 -16 12"/>
    </g>
  </g>
  <g fill="#8a7346" opacity="0.09">
    <!-- scattered seeds -->
    <circle cx="180" cy="40" r="3"/>
    <circle cx="196" cy="52" r="2"/>
    <circle cx="30" cy="120" r="2.5"/>
    <circle cx="120" cy="70" r="2"/>
    <circle cx="160" cy="190" r="2.5"/>
    <circle cx="40" cy="196" r="2"/>
  </g>
</svg>
